<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Web Environment</title>
    <style>
        :root {
            /* macOS System Colors & Variables */
            --sys-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --menu-bar-bg: rgba(255, 255, 255, 0.3);
            --menu-bar-text: #000;
            --dock-bg: rgba(255, 255, 255, 0.25);
            --window-bg: rgba(245, 245, 247, 0.95);
            --sidebar-bg: rgba(230, 230, 230, 0.6);
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 20px 50px -10px rgba(0, 0, 0, 0.3);
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            
            /* Traffic Lights */
            --mac-red: #ff5f56;
            --mac-yellow: #ffbd2e;
            --mac-green: #27c93f;
        }

        /* Dark Mode Media Query */
        @media (prefers-color-scheme: dark) {
            :root {
                --menu-bar-bg: rgba(0, 0, 0, 0.4);
                --menu-bar-text: #fff;
                --dock-bg: rgba(0, 0, 0, 0.4);
                --window-bg: rgba(30, 30, 30, 0.95);
                --sidebar-bg: rgba(40, 40, 40, 0.8);
                --border-color: rgba(255, 255, 255, 0.1);
                --shadow-heavy: 0 25px 60px -10px rgba(0, 0, 0, 0.6);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--sys-font);
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* High-quality CSS Mesh Gradient mimicking macOS Monterey/Ventura Abstract Wallpapers */
            background-color: #ff9a9e;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(22,100%,77%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(242,100%,70%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(280,100%,71%,1) 0, transparent 50%);
            background-size: cover;
            background-position: center;
        }

        /* --- MENU BAR --- */
        .menu-bar {
            height: 28px;
            width: 100%;
            background: var(--menu-bar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--menu-bar-text);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }

        .menu-left, .menu-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-item {
            cursor: default;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.1s;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .apple-logo {
            font-size: 16px;
            padding-bottom: 2px;
        }

        .bold-menu {
            font-weight: 700;
        }

        /* --- DOCK --- */
        .dock-container {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            height: 64px;
            padding: 8px;
            background: var(--dock-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            box-shadow: var(--shadow-light);
            z-index: 9000;
        }

        .dock-icon-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .dock-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s ease, width 0.1s ease, height 0.1s ease;
            transform-origin: bottom;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* App Specific Icons built with CSS/SVG */
        .icon-finder {
            background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%);
            border: 1px solid #d1d5db;
        }
        
        .icon-notes {
            background: linear-gradient(180deg, #ffde59 0%, #ffbd2e 100%);
            border: 1px solid #fbbf24;
            position: relative;
        }
        .icon-notes::after {
            content: '';
            position: absolute;
            top: 15px; width: 60%; height: 2px; background: rgba(0,0,0,0.2);
            box-shadow: 0 6px 0 rgba(0,0,0,0.2), 0 12px 0 rgba(0,0,0,0.2);
        }

        .dock-dot {
            width: 4px;
            height: 4px;
            background: var(--menu-bar-text);
            border-radius: 50%;
            margin-top: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .dock-dot.active { opacity: 0.6; }

        .tooltip {
            position: absolute;
            top: -35px;
            background: var(--menu-bar-bg);
            color: var(--menu-bar-text);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .dock-icon-wrapper:hover .tooltip { opacity: 1; }

        /* --- WINDOW SYSTEM --- */
        .window {
            position: absolute;
            top: 15%;
            left: 20%;
            width: 800px;
            height: 500px;
            background: var(--window-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-heavy);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            
            /* macOS Spring Animation */
            transform: scale(0.8);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), opacity 0.2s ease;
            z-index: 100;
        }

        .window.open {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .window.maximized {
            top: 28px !important; /* Below menu bar */
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 28px) !important;
            border-radius: 0;
            transition: all 0.3s ease;
        }

        .window-header {
            height: 50px;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: default;
        }

        .traffic-lights {
            display: flex;
            gap: 8px;
            margin-right: 20px;
        }

        .tl-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .tl-btn svg { width: 8px; height: 8px; opacity: 0; transition: opacity 0.1s; stroke: #000; stroke-width: 2;}
        .traffic-lights:hover .tl-btn svg { opacity: 0.5; }

        .tl-close { background: var(--mac-red); border: 1px solid #e0443e; }
        .tl-min { background: var(--mac-yellow); border: 1px solid #dea123; }
        .tl-max { background: var(--mac-green); border: 1px solid #1aab29; }

        /* --- NOTES APP UI --- */
        .app-content {
            display: flex;
            flex: 1;
            height: calc(100% - 50px);
        }

        .sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .note-item {
            padding: 10px 15px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }
        .note-item.active {
            background: var(--mac-yellow);
            color: #000;
        }
        .note-item h4 { font-size: 13px; margin-bottom: 4px; }
        .note-item p { font-size: 11px; opacity: 0.7; }

        .main-content {
            flex: 1;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
        }

        .note-date {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }

        .editor {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            line-height: 1.6;
            color: var(--menu-bar-text);
            resize: none;
            font-family: var(--sys-font);
        }
    </style>
</head>
<body>

    <!-- Top Menu Bar -->
    <div class="menu-bar">
        <div class="menu-left">
            <span class="menu-item apple-logo"></span>
            <span class="menu-item bold-menu" id="active-app-name">Finder</span>
            <span class="menu-item">File</span>
            <span class="menu-item">Edit</span>
            <span class="menu-item">View</span>
            <span class="menu-item">Go</span>
            <span class="menu-item">Window</span>
            <span class="menu-item">Help</span>
        </div>
        <div class="menu-right">
            <span class="menu-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
            </span>
            <span class="menu-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="16" height="10" rx="2" ry="2"></rect><line x1="22" y1="11" x2="22" y2="13"></line></svg>
            </span>
            <span class="menu-item" id="clock">Mon 9:41 AM</span>
        </div>
    </div>

    <!-- Notes Window -->
    <div class="window" id="notes-app">
        <div class="window-header" id="notes-header">
            <div class="traffic-lights">
                <button class="tl-btn tl-close" onclick="toggleApp('notes-app', false)">
                    <svg viewBox="0 0 14 14"><line x1="3" y1="3" x2="11" y2="11"/><line x1="3" y1="11" x2="11" y2="3"/></svg>
                </button>
                <button class="tl-btn tl-min" onclick="toggleApp('notes-app', false)">
                    <svg viewBox="0 0 14 14"><line x1="3" y1="7" x2="11" y2="7"/></svg>
                </button>
                <button class="tl-btn tl-max" onclick="maximizeWindow('notes-app')">
                    <svg viewBox="0 0 14 14"><line x1="6" y1="3" x2="6" y2="11"/><line x1="3" y1="6" x2="11" y2="6"/></svg>
                </button>
            </div>
            <div style="display: flex; gap: 15px; margin-left: 10px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </div>
        </div>
        <div class="app-content">
            <div class="sidebar">
                <div class="note-item active">
                    <h4>New Note</h4>
                    <p>No additional text</p>
                </div>
            </div>
            <div class="main-content">
                <div class="note-date" id="note-date">October 24, 2026 at 9:41 AM</div>
                <textarea class="editor" id="note-editor" placeholder="Start writing your note here..."></textarea>
            </div>
        </div>
    </div>

    <!-- Bottom Dock -->
    <div class="dock-container" id="dock">
        <!-- Finder -->
        <div class="dock-icon-wrapper" onclick="document.getElementById('active-app-name').innerText = 'Finder'">
            <div class="tooltip">Finder</div>
            <div class="dock-icon icon-finder">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div class="dock-dot active"></div>
        </div>

        <!-- Notes -->
        <div class="dock-icon-wrapper" onclick="toggleApp('notes-app', true)">
            <div class="tooltip">Notes</div>
            <div class="dock-icon icon-notes"></div>
            <div class="dock-dot" id="notes-dot"></div>
        </div>
    </div>

    <script>
        // --- LIVE CLOCK ---
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: 'numeric' };
            document.getElementById('clock').innerText = now.toLocaleDateString('en-US', options).replace(',', '');
            document.getElementById('note-date').innerText = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- APP MANAGEMENT ---
        let highestZIndex = 100;

        function toggleApp(appId, show) {
            const app = document.getElementById(appId);
            const dot = document.getElementById(appId.split('-')[0] + '-dot'); // e.g. notes-dot
            
            if (show) {
                app.classList.add('open');
                if(dot) dot.classList.add('active');
                app.style.zIndex = ++highestZIndex;
                document.getElementById('active-app-name').innerText = 'Notes';
            } else {
                app.classList.remove('open');
                if(dot) dot.classList.remove('active');
                document.getElementById('active-app-name').innerText = 'Finder';
            }
        }

        function maximizeWindow(appId) {
            const app = document.getElementById(appId);
            app.classList.toggle('maximized');
        }

        // --- DRAGGABLE WINDOW LOGIC ---
        function makeDraggable(element, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            handle.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                // Don't drag if clicking traffic lights
                if(e.target.closest('.traffic-lights')) return;
                
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                
                // Bring window to front
                element.style.zIndex = ++highestZIndex;
                document.getElementById('active-app-name').innerText = 'Notes';
            }

            function elementDrag(e) {
                e.preventDefault();
                // Prevent dragging above menu bar
                if(e.clientY < 28) return; 

                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                // Avoid dragging if maximized
                if(!element.classList.contains('maximized')) {
                    element.style.top = (element.offsetTop - pos2) + "px";
                    element.style.left = (element.offsetLeft - pos1) + "px";
                }
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        makeDraggable(document.getElementById('notes-app'), document.getElementById('notes-header'));

        // Bring to front on click anywhere on the window
        document.getElementById('notes-app').addEventListener('mousedown', function() {
            this.style.zIndex = ++highestZIndex;
            document.getElementById('active-app-name').innerText = 'Notes';
        });

        // --- DOCK MAGNIFICATION EFFECT ---
        const dock = document.getElementById('dock');
        const icons = document.querySelectorAll('.dock-icon');
        const baseSize = 48;
        const maxSize = 72;
        const range = 150; // Distance of effect

        dock.addEventListener('mousemove', (e) => {
            icons.forEach(icon => {
                const rect = icon.getBoundingClientRect();
                // Center of the icon
                const iconCenterX = rect.left + rect.width / 2;
                // Distance from mouse to icon center
                const distance = Math.abs(e.clientX - iconCenterX);

                if (distance < range) {
                    // Calculate scale based on distance (closer = bigger)
                    const scale = 1 + ((maxSize - baseSize) / baseSize) * (1 - distance / range);
                    icon.style.width = `${baseSize * scale}px`;
                    icon.style.height = `${baseSize * scale}px`;
                    icon.style.marginBottom = `${(baseSize * scale - baseSize) / 2}px`; // Push up
                } else {
                    resetIcon(icon);
                }
            });
        });

        dock.addEventListener('mouseleave', () => {
            icons.forEach(resetIcon);
        });

        function resetIcon(icon) {
            icon.style.width = `${baseSize}px`;
            icon.style.height = `${baseSize}px`;
            icon.style.marginBottom = `0px`;
        }

        // --- NOTES AUTO-SAVE LOGIC ---
        const editor = document.getElementById('note-editor');
        
        // Load saved note
        const savedNote = localStorage.getItem('mac-note');
        if(savedNote) {
            editor.value = savedNote;
        }

        // Save on type
        editor.addEventListener('input', () => {
            localStorage.setItem('mac-note', editor.value);
            // Update sidebar text snippet
            const preview = editor.value.length > 20 ? editor.value.substring(0, 20) + '...' : editor.value;
            document.querySelector('.note-item p').innerText = preview || 'No additional text';
        });

    </script>
</body>
</html>
