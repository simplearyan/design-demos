    <script>
        // --- Theme Management ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        // Check for saved theme or system preference
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // --- Sidebar Toggle Logic ---
        const menuToggleBtn = document.getElementById('menu-toggle');
        const fullSidebar = document.getElementById('full-sidebar');
        const miniSidebar = document.getElementById('mini-sidebar');
        const mainContent = document.getElementById('main-content');
        
        // Create an overlay for the tablet off-canvas drawer
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 top-14 bg-black/50 z-30 hidden lg:hidden cursor-pointer transition-opacity';
        document.body.appendChild(overlay);

        menuToggleBtn.addEventListener('click', () => {
            if (window.innerWidth >= 1024) {
                // Desktop: Toggle between full and mini sidebar classes
                fullSidebar.classList.toggle('lg:flex');
                miniSidebar.classList.toggle('lg:hidden');
                mainContent.classList.toggle('lg:ml-[240px]');
            } else {
                // Tablet: Toggle off-canvas drawer
                if (fullSidebar.classList.contains('hidden')) {
                    fullSidebar.classList.remove('hidden');
                    fullSidebar.classList.add('flex', 'shadow-2xl');
                    overlay.classList.remove('hidden');
                    document.body.style.overflow = 'hidden'; // Stop background scrolling
                } else {
                    closeDrawer();
                }
            }
        });

        function closeDrawer() {
            if (window.innerWidth < 1024) {
                fullSidebar.classList.add('hidden');
                fullSidebar.classList.remove('flex', 'shadow-2xl');
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        overlay.addEventListener('click', closeDrawer);

        // Reset drawer state on window resize to avoid visual bugs
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) {
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
                fullSidebar.classList.remove('flex', 'shadow-2xl');
                
                // Ensure hidden class is present so desktop relies purely on 'lg:flex' for visibility
                if (!fullSidebar.classList.contains('hidden')) {
                    fullSidebar.classList.add('hidden');
                }
            }
        });

                        </div>
                        <!-- More Options Icon (Vertical dots) visible on hover/mobile -->
                        <button class="absolute right-4 sm:relative sm:right-auto sm:ml-auto p-1.5 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity rounded-full hover:bg-gray-200 dark:hover:bg-yt-hoverDark">
                            <i class="ph-bold ph-dots-three-vertical text-xl"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            grid.innerHTML = videoHTML;
        }

        // Initialize the videos on load
        document.addEventListener('DOMContentLoaded', renderVideos);
    </script>
</body>
