<head>

    <!-- Google Fonts: Roboto -->

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'Arial', 'sans-serif'],

                    colors: {
                        yt: {
                            black: '#0f0f0f',

    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {

            scrollbar-width: none;
        }
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
            overscroll-behavior-y: none;
        }
        /* Subtly blur the playlist background container */
        .playlist-bg {
            backdrop-filter: blur(40px);

</head>

    <!-- MAIN CONTENT AREA (Playlist Layout) -->
    <main id="main-content" class="pt-14 pb-16 sm:pb-0 sm:ml-[72px] lg:ml-[240px] min-h-screen transition-all duration-300">
        
        <div class="flex flex-col lg:flex-row p-0 sm:p-6 lg:p-8 lg:gap-8 max-w-[1600px] mx-auto">
            
            <!-- Left Column: Playlist Information -->
            <div class="relative w-full lg:w-[360px] xl:w-[400px] flex-shrink-0">
                <!-- Desktop Sticky Container -->
                <div class="lg:sticky lg:top-24">
                    <!-- Background Gradient (Full width on mobile, rounded on desktop) -->
                    <div class="absolute inset-0 bg-gradient-to-b from-[#1a365d] to-white dark:to-yt-black lg:rounded-2xl -z-10 lg:bottom-auto lg:h-full opacity-30 dark:opacity-40"></div>
                    
                    <div class="p-5 lg:p-6 flex flex-col sm:flex-row lg:flex-col gap-4 lg:gap-6 playlist-bg lg:rounded-2xl">
                        <!-- Playlist Cover Image -->
                        <div class="w-full sm:w-64 lg:w-full aspect-video rounded-xl overflow-hidden shadow-lg relative group">
                            <img src="https://images.unsplash.com/photo-1511192336575-5a79af67a629?auto=format&fit=crop&q=80&w=640&h=360" alt="Playlist Cover" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">

                            <div class="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center transition-opacity">
                                <i class="ph-fill ph-play text-white text-5xl"></i>
                            </div>
                        </div>

                        <!-- Playlist Details -->
                        <div class="flex flex-col flex-1">

                            </h1>

                                <p class="font-medium text-black dark:text-white hover:underline cursor-pointer">You</p>
                                <p>Playlist • 8 videos • No views</p>
                                <p>Updated today</p>
                            </div>

                            <!-- Action Buttons -->
                            <div class="flex items-center gap-3 mt-5">
                                <button class="flex-1 bg-black dark:bg-white text-white dark:text-black rounded-full py-2 px-4 flex items-center justify-center gap-2 font-medium hover:bg-gray-800 dark:hover:bg-gray-200 transition">

                                </button>
                                <button class="flex-1 bg-gray-200 dark:bg-yt-dark hover:bg-gray-300 dark:hover:bg-yt-hoverDark text-black dark:text-white rounded-full py-2 px-4 flex items-center justify-center gap-2 font-medium transition">

            <!-- Right Column: Video List -->
            <div class="flex-1 flex flex-col mt-4 lg:mt-0 px-2 sm:px-0">

                <!-- Video List Container -->
                <div id="playlist-videos" class="flex flex-col">

    </main>

    <script>
        // --- Theme Management ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            htmlElement.classList.add('dark');
        } else {
            htmlElement.classList.remove('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            localStorage.setItem('theme', htmlElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // --- Sidebar Toggle Logic (Desktop & Tablet Overlay) ---
        const menuToggleBtn = document.getElementById('menu-toggle');
        const fullSidebar = document.getElementById('full-sidebar');
        const miniSidebar = document.getElementById('mini-sidebar');
        const mainContent = document.getElementById('main-content');
        
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 top-14 bg-black/50 z-30 hidden lg:hidden cursor-pointer transition-opacity';
        document.body.appendChild(overlay);

        menuToggleBtn.addEventListener('click', () => {
            if (window.innerWidth >= 1024) {
                fullSidebar.classList.toggle('lg:flex');
                miniSidebar.classList.toggle('lg:hidden');
                mainContent.classList.toggle('lg:ml-[240px]');
            } else {
                if (fullSidebar.classList.contains('hidden')) {
                    fullSidebar.classList.remove('hidden');
                    fullSidebar.classList.add('flex', 'shadow-2xl');
                    overlay.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                } else {
                    closeDrawer();
                }
            }
        });

        function closeDrawer() {
            if (window.innerWidth < 1024) {
                fullSidebar.classList.add('hidden');
                fullSidebar.classList.remove('flex', 'shadow-2xl');
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }
        overlay.addEventListener('click', closeDrawer);

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) {
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
                fullSidebar.classList.remove('flex', 'shadow-2xl');
                if (!fullSidebar.classList.contains('hidden')) fullSidebar.classList.add('hidden');
            }
        });

        // --- Smart Scroll for Mobile Navbar and Header ---
        let lastScrollY = window.scrollY;
        const mainHeader = document.getElementById('main-header');
        const bottomNav = document.getElementById('bottom-nav');

        window.addEventListener('scroll', () => {
            if (window.innerWidth >= 640) return; // Desktop/Tablet ignored
            
            const currentScrollY = window.scrollY;
            if (currentScrollY <= 0) {
                mainHeader.style.transform = 'translateY(0)';
                bottomNav.style.transform = 'translateY(0)';
                lastScrollY = currentScrollY;
                return;
            }
            if (currentScrollY > lastScrollY && currentScrollY > 50) {
                mainHeader.style.transform = 'translateY(-100%)';
                bottomNav.style.transform = 'translateY(100%)';
            } else {
                mainHeader.style.transform = 'translateY(0)';
                bottomNav.style.transform = 'translateY(0)';
            }
            lastScrollY = currentScrollY;
        }, { passive: true });

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 640) {
                mainHeader.style.transform = 'translateY(0)';
                bottomNav.style.transform = 'translateY(0)';
            }
        });

        // --- Mock Playlist Data & Rendering ---
        const playlistVideos = [
            {
                id: 1,
                title: "Relaxing Jazz Music & Rain Sounds for Studying",
                thumbnail: "https://images.unsplash.com/photo-1511192336575-5a79af67a629?auto=format&fit=crop&q=80&w=640&h=360",
                duration: "3:00:00",
                channel: "Cozy Vibes",
                views: "4.5M views",
                postedAt: "1 month ago"
            },
            {
                id: 2,
                title: "Lofi hip hop radio - beats to relax/study to",
                thumbnail: "https://images.unsplash.com/photo-1516280440502-86923485abdf?auto=format&fit=crop&q=80&w=640&h=360",
                duration: "LIVE",
                channel: "ChilledCow",
                views: "25K watching",
                postedAt: "Started 2 years ago"
            },
            {
                id: 3,
                title: "Beautiful Piano Music 24/7 - Study Music, Relaxing Music",
                thumbnail: "https://images.unsplash.com/photo-1520523839897-bd0b52f945a0?auto=format&fit=crop&q=80&w=640&h=360",
                duration: "2:15:30",
                channel: "Rousseau",
                views: "1.2M views",
                postedAt: "1 year ago"
            },
            {
                id: 4,
                title: "Cyberpunk Ambient City Sounds - Sci-Fi Ambience",
                thumbnail: "https://images.unsplash.com/photo-1515630278258-407f66498911?auto=format&fit=crop&q=80&w=640&h=360",
                duration: "1:00:00",
                channel: "Futurescapes",
                views: "890K views",
                postedAt: "3 months ago"
            },
            {
                id: 5,
                title: "Focus Music for Work and Studying, Background Music",
                thumbnail: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&q=80&w=640&h=360",
                duration: "4:30:00",
                channel: "Deep Focus",
                views: "2.1M views",
                postedAt: "5 months ago"
            },
            {
                id: 6,
                title: "Dark Academia Ambience - Classical Music & Rain",
                thumbnail: "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?auto=format&fit=crop&q=80&w=640&h=360",
                duration: "1:25:00",
                channel: "Aesthetic Sounds",
                views: "3.4M views",
                postedAt: "2 years ago"
            },
            {
                id: 7,
                title: "Japanese Garden Ambience - Water Sounds, Birds",
                thumbnail: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&q=80&w=640&h=360",
                duration: "2:00:00",
                channel: "Nature Zen",
                views: "500K views",
                postedAt: "1 week ago"
            },
            {
                id: 8,
                title: "Synthesizer Retrowave Mix - Midnight Drive",
                thumbnail: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=640&h=360",
                duration: "45:00",
                channel: "Synth Central",
                views: "1.8M views",
                postedAt: "8 months ago"
            }
        ];

        function renderPlaylist() {
            const container = document.getElementById('playlist-videos');
            
            const html = playlistVideos.map((video, index) => `
                <div class="flex flex-row items-start sm:items-center gap-3 sm:gap-4 p-2 sm:p-3 hover:bg-gray-100 dark:hover:bg-yt-hoverDark rounded-xl cursor-pointer group transition">
                    
                    <!-- Index Number (Hidden on mobile for cleaner look) -->
                    <div class="hidden sm:flex text-gray-500 font-medium w-6 justify-center">
                        ${index + 1}
                    </div>
                    
                    <!-- Thumbnail Container -->
                    <div class="relative w-36 sm:w-40 flex-shrink-0 aspect-video rounded-lg overflow-hidden bg-gray-200 dark:bg-yt-darker">
                        <img src="${video.thumbnail}" alt="${video.title}" class="w-full h-full object-cover">
                        <span class="absolute bottom-1 right-1 sm:bottom-1.5 sm:right-1.5 ${video.duration === 'LIVE' ? 'bg-yt-red text-white' : 'bg-black/80 text-white'} text-[10px] sm:text-xs font-medium px-1 sm:px-1.5 py-0.5 rounded">
                            ${video.duration}
                        </span>
                        
                        <!-- Overlay Play icon on thumbnail hover -->
                        <div class="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center transition-opacity">
                            <i class="ph-fill ph-play text-white text-2xl"></i>
                        </div>
                    </div>
                    
                    <!-- Video Details -->
                    <div class="flex-1 flex flex-col justify-start overflow-hidden pr-2">
                        <h3 class="text-sm sm:text-base font-medium text-black dark:text-white line-clamp-2 leading-snug">
                            ${video.title}
                        </h3>
                        <div class="text-xs sm:text-[13px] text-gray-600 dark:text-gray-400 mt-1 flex flex-col sm:flex-row sm:items-center gap-0 sm:gap-1">
                            <span class="hover:text-black dark:hover:text-white transition-colors truncate">${video.channel}</span>
                            <span class="hidden sm:block text-[10px]">•</span>
                            <div class="flex items-center truncate mt-0.5 sm:mt-0">
                                <span>${video.views}</span>
                                <span class="mx-1 text-[10px]">•</span>
                                <span>${video.postedAt}</span>
                            </div>
                        </div>
                    </div>

                    <!-- More Options Icon -->
                    <button class="p-1.5 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity rounded-full hover:bg-gray-200 dark:hover:bg-[#3f3f3f] flex-shrink-0 text-black dark:text-white">
                        <i class="ph-bold ph-dots-three-vertical text-xl"></i>
                    </button>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', renderPlaylist);
    </script>
