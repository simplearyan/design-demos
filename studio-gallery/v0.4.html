<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Collection</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { 
                        /* Authentic macOS / iOS typography stack */
                        sans: [
                            'system-ui', 
                            '-apple-system', 
                            'BlinkMacSystemFont', 
                            '"SF Pro Display"', 
                            '"SF Pro Text"', 
                            '"Helvetica Neue"', 
                            'sans-serif'
                        ] 
                    },
                    colors: {
                        apple: {
                            blue: '#007AFF',
                            dark: '#000000',
                            grayDark: '#1c1c1e',
                            grayLight: '#f5f5f7',
                            borderLight: 'rgba(0, 0, 0, 0.05)',
                            borderDark: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    boxShadow: {
                        'mac': '0 4px 24px -6px rgba(0, 0, 0, 0.1)',
                        'mac-dark': '0 10px 40px -10px rgba(0, 0, 0, 0.8)'
                    }
                } 
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { color-scheme: light dark; }
        
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Minimalist macOS Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(150, 150, 150, 0.3); 
            border-radius: 10px; 
            border: 2px solid transparent; 
            background-clip: content-box; 
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(150, 150, 150, 0.5); border: 2px solid transparent; background-clip: content-box; }

        /* Sidebar Navigation Items */
        .nav-item {
            transition: all 0.15s ease-out;
        }
        
        /* Light Mode Active (macOS Finder style selection) */
        html:not(.dark) .nav-item.active {
            background-color: rgba(0, 0, 0, 0.06); 
            color: #000000; 
            font-weight: 600;
        }
        
        /* Dark Mode Active (macOS Finder style selection) */
        html.dark .nav-item.active {
            background-color: rgba(255, 255, 255, 0.12); 
            color: #ffffff; 
            font-weight: 600;
        }

        /* Hide scrollbar for mobile nav */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Card Hover Physics */
        .card-container {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }
        .card-container:hover {
            transform: scale(1.02);
        }
        .icon-arrow {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-container:hover .icon-arrow {
            transform: translate(2px, -2px);
        }
    </style>
</head>
<body class="bg-white dark:bg-apple-dark text-gray-900 dark:text-gray-100 transition-colors duration-300 h-screen flex flex-col overflow-hidden">

    <!-- Translucent macOS Header -->
    <header class="w-full h-[52px] flex items-center justify-between px-5 shrink-0 border-b border-apple-borderLight dark:border-apple-borderDark bg-white/70 dark:bg-apple-grayDark/70 backdrop-blur-2xl z-40">
        
        <!-- Logo -->
        <div class="flex items-center gap-2">
            <h1 class="font-semibold text-lg tracking-tight flex items-center gap-1.5 text-black dark:text-white">
                <i data-lucide="command" class="w-4 h-4"></i> Studio<span class="font-normal text-gray-500">Pro</span>
            </h1>
        </div>

        <!-- Desktop Search (Centered, Apple Spotlight Style) -->
        <div class="hidden md:flex items-center justify-center flex-1 px-8">
            <div class="relative w-full max-w-[400px] group">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400 group-focus-within:text-gray-600 dark:group-focus-within:text-gray-300 transition-colors"></i>
                <input type="text" id="search-input" placeholder="Search tools..." class="w-full bg-gray-100/80 dark:bg-white/10 border border-transparent focus:bg-white dark:focus:bg-apple-grayDark focus:ring-2 focus:ring-apple-blue/50 rounded-lg py-1.5 pl-8 pr-4 text-[13px] text-black dark:text-white outline-none transition-all placeholder-gray-400 dark:placeholder-gray-500 shadow-sm" oninput="handleSearch()">
            </div>
        </div>

        <!-- Right Actions -->
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="text-gray-500 hover:text-black dark:hover:text-white transition-colors">
                <i data-lucide="sun" class="w-4 h-4 hidden dark:block" id="icon-light"></i>
                <i data-lucide="moon" class="w-4 h-4 block dark:hidden" id="icon-dark"></i>
            </button>
            <a href="#" class="hidden sm:flex items-center justify-center px-4 py-1.5 rounded-md bg-apple-blue hover:bg-blue-600 text-white font-medium text-[13px] transition-colors shadow-sm">
                Get Started
            </a>
        </div>
    </header>

    <!-- Main Layout Area -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Left Sidebar (Desktop Only - Translucent Material) -->
        <aside class="hidden md:flex w-[220px] flex-col border-r border-apple-borderLight dark:border-apple-borderDark bg-apple-grayLight/50 dark:bg-apple-grayDark/50 backdrop-blur-3xl shrink-0">
            <nav class="flex-1 px-3 py-6 space-y-1" id="desktop-nav">
                <button class="nav-item active w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] text-gray-600 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-category="All" onclick="setCategory('All')">
                    <i data-lucide="layout-grid" class="w-4 h-4 opacity-70"></i> All Studios
                </button>
                <div class="h-4"></div> <!-- Spacer -->
                
                <h4 class="px-3 text-[11px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">Categories</h4>
                
                <button class="nav-item w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] text-gray-600 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-category="Animation" onclick="setCategory('Animation')">
                    <i data-lucide="film" class="w-4 h-4 opacity-70"></i> Animation
                </button>
                <button class="nav-item w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] text-gray-600 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-category="Drawing" onclick="setCategory('Drawing')">
                    <i data-lucide="pen-tool" class="w-4 h-4 opacity-70"></i> Drawing & Art
                </button>
                <button class="nav-item w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] text-gray-600 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-category="Utility" onclick="setCategory('Utility')">
                    <i data-lucide="wrench" class="w-4 h-4 opacity-70"></i> Utility
                </button>
                <button class="nav-item w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] text-gray-600 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/5 transition-colors" data-category="3D" onclick="setCategory('3D')">
                    <i data-lucide="box" class="w-4 h-4 opacity-70"></i> 3D & WebGL
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col overflow-hidden bg-white dark:bg-apple-dark relative">
            
            <!-- Mobile Search & Horizontal Nav (Hidden on Desktop) -->
            <div class="md:hidden flex flex-col shrink-0 border-b border-apple-borderLight dark:border-apple-borderDark bg-white/70 dark:bg-apple-grayDark/70 backdrop-blur-xl pt-3">
                <div class="px-4 mb-3 relative">
                    <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" id="mobile-search-input" placeholder="Search tools..." class="w-full bg-gray-100 dark:bg-white/10 border-none rounded-lg py-2 pl-9 pr-4 text-[14px] text-black dark:text-white outline-none" oninput="document.getElementById('search-input').value = this.value; handleSearch();">
                </div>
                <div class="flex overflow-x-auto hide-scrollbar px-4 pb-3 gap-2" id="mobile-nav">
                    <button class="nav-item active shrink-0 px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-gray-100 dark:bg-white/10 text-black dark:text-white" data-category="All" onclick="setCategory('All')">All</button>
                    <button class="nav-item shrink-0 px-3.5 py-1.5 rounded-full text-[13px] font-medium text-gray-600 dark:text-gray-400" data-category="Animation" onclick="setCategory('Animation')">Animation</button>
                    <button class="nav-item shrink-0 px-3.5 py-1.5 rounded-full text-[13px] font-medium text-gray-600 dark:text-gray-400" data-category="Drawing" onclick="setCategory('Drawing')">Drawing</button>
                    <button class="nav-item shrink-0 px-3.5 py-1.5 rounded-full text-[13px] font-medium text-gray-600 dark:text-gray-400" data-category="Utility" onclick="setCategory('Utility')">Utility</button>
                    <button class="nav-item shrink-0 px-3.5 py-1.5 rounded-full text-[13px] font-medium text-gray-600 dark:text-gray-400" data-category="3D" onclick="setCategory('3D')">3D</button>
                </div>
            </div>

            <!-- Scrollable Gallery -->
            <div class="flex-1 overflow-y-auto p-6 md:p-12 lg:px-16">
                
                <div class="max-w-5xl mx-auto">
                    <!-- Hero -->
                    <div class="mb-10 sm:mb-12">
                        <h2 class="text-4xl sm:text-[44px] font-bold tracking-tight mb-3 text-black dark:text-white leading-tight">Creative browser engines.</h2>
                        <p class="text-[17px] text-gray-500 dark:text-gray-400 max-w-2xl leading-relaxed font-medium">
                            Professional animations, drawings, and 3D renders generated entirely with native web technologies.
                        </p>
                    </div>

                    <!-- Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-8" id="studio-grid">
                        <!-- Cards injected via JS -->
                    </div>

                    <!-- Empty State -->
                    <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-gray-400 dark:text-gray-500">
                        <i data-lucide="search-x" class="w-12 h-12 mb-4 opacity-40"></i>
                        <h3 class="text-[16px] font-semibold text-black dark:text-white">No results found</h3>
                        <p class="text-[14px] mt-1">We couldn't find any engines matching your search.</p>
                    </div>
                </div>

                <footer class="mt-20 pb-6 text-center text-[12px] font-medium text-gray-400 dark:text-gray-600">
                    <p>Designed for native performance on the web.</p>
                </footer>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // --- Theme Logic ---
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateMobileNavStyles();
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // --- Studio Data ---
        const studios = [
            { id: 1, title: "Macify Web Studio", category: "Utility", icon: "monitor", gradient: "from-sky-400 to-blue-600" },
            { id: 2, title: "Sumi-e Studio Pro", category: "Drawing", icon: "feather", gradient: "from-rose-500 to-red-700" },
            { id: 3, title: "Title Animator Pro", category: "Animation", icon: "type", gradient: "from-fuchsia-500 to-purple-600" },
            { id: 4, title: "Waveform Studio", category: "Utility", icon: "audio-lines", gradient: "from-orange-500 to-rose-600" },
            { id: 5, title: "Emoji Motion", category: "Animation", icon: "smile", gradient: "from-yellow-400 to-amber-600" },
            { id: 6, title: "Mixamo 3D Studio", category: "3D", icon: "box", gradient: "from-blue-500 to-indigo-700" },
            { id: 7, title: "Rough Animator", category: "Drawing", icon: "pen-tool", gradient: "from-indigo-500 to-purple-600" },
            { id: 8, title: "Social Animator", category: "Utility", icon: "share-2", gradient: "from-cyan-400 to-blue-500" },
            { id: 9, title: "Motion Math", category: "Animation", icon: "sigma", gradient: "from-emerald-400 to-teal-600" }
        ];

        let currentCategory = 'All';
        let currentSearch = '';

        function updateMobileNavStyles() {
            // Specifically handle the mobile pill buttons
            const isDark = document.documentElement.classList.contains('dark');
            document.querySelectorAll('#mobile-nav .nav-item').forEach(btn => {
                const isActive = btn.dataset.category === currentCategory;
                btn.className = `nav-item shrink-0 px-3.5 py-1.5 rounded-full text-[13px] font-medium transition-colors ${btn.dataset.category}`;
                
                if (isActive) {
                    btn.classList.add(isDark ? 'bg-white/10' : 'bg-gray-100', isDark ? 'text-white' : 'text-black');
                } else {
                    btn.classList.add('bg-transparent', isDark ? 'text-gray-400' : 'text-gray-600');
                }
            });
        }

        function setCategory(category) {
            currentCategory = category;
            
            // Desktop Sidebar update
            document.querySelectorAll('#desktop-nav .nav-item').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) {
                    btn.classList.add('active');
                }
            });
            
            updateMobileNavStyles();
            renderGrid();
        }

        function handleSearch() {
            currentSearch = document.getElementById('search-input').value.toLowerCase();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('studio-grid');
            const emptyState = document.getElementById('empty-state');
            
            const filtered = studios.filter(studio => {
                const matchesCategory = currentCategory === 'All' || studio.category === currentCategory;
                const matchesSearch = studio.title.toLowerCase().includes(currentSearch);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            let html = '';
            filtered.forEach(studio => {
                html += `
                    <div class="card-container cursor-pointer flex flex-col gap-3 group bg-white dark:bg-apple-grayDark border border-apple-borderLight dark:border-apple-borderDark rounded-2xl p-4 shadow-mac dark:shadow-mac-dark">
                        
                        <!-- Thumbnail Image Area (Apple Style) -->
                        <div class="aspect-[4/3] rounded-xl bg-gray-50 dark:bg-black/50 flex items-center justify-center overflow-hidden relative mb-1">
                            
                            <!-- Soft Gradient Glow -->
                            <div class="absolute inset-0 opacity-[0.08] dark:opacity-[0.15] bg-gradient-to-br ${studio.gradient}"></div>
                            
                            <!-- Centered Icon App Block -->
                            <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-[18px] bg-white dark:bg-zinc-800 shadow-sm border border-black/5 dark:border-white/5 flex items-center justify-center relative z-10">
                                <i data-lucide="${studio.icon}" class="w-7 h-7 sm:w-8 sm:h-8 text-black dark:text-white"></i>
                            </div>
                        </div>

                        <!-- Minimal Content -->
                        <div class="flex items-start justify-between px-1">
                            <div>
                                <h3 class="font-semibold text-[15px] text-black dark:text-white tracking-tight mb-0.5">${studio.title}</h3>
                                <p class="text-[13px] text-gray-500 dark:text-gray-400 font-medium">${studio.category}</p>
                            </div>
                            <!-- Appears on hover -->
                            <div class="w-7 h-7 rounded-full bg-gray-100 dark:bg-white/10 flex items-center justify-center text-gray-500 dark:text-gray-300 opacity-0 -translate-x-2 group-hover:translate-x-0 group-hover:opacity-100 transition-all duration-300">
                                <i data-lucide="arrow-right" class="w-3.5 h-3.5 icon-arrow"></i>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
            lucide.createIcons();
        }

        // Initialize
        updateMobileNavStyles();
        renderGrid();

    </script>
</body>
</html>
