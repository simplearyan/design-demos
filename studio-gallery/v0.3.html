<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Collection</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { 
                        /* Authentic macOS / iOS typography */
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Helvetica Neue', 'sans-serif'] 
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            900: '#4c1d95',
                        },
                        zinc: {
                            850: '#1f1f22',
                            950: '#09090b',
                        }
                    }
                } 
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { color-scheme: light dark; }
        
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Minimalist Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(150, 150, 150, 0.4); }

        /* Sidebar Navigation Items */
        .nav-item {
            transition: all 0.2s ease;
        }
        
        /* Light Mode Active */
        html:not(.dark) .nav-item.active {
            background-color: #f5f3ff; /* brand-50 */
            color: #7c3aed; /* brand-600 */
            font-weight: 600;
        }
        
        /* Dark Mode Active */
        html.dark .nav-item.active {
            background-color: rgba(139, 92, 246, 0.15); /* brand-500 w/ opacity */
            color: #c4b5fd; /* purple-300 */
            font-weight: 600;
        }

        /* Hide scrollbar for mobile nav */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-300 h-screen flex flex-col overflow-hidden">

    <!-- Minimal Header -->
    <header class="w-full h-[64px] flex items-center justify-between px-6 shrink-0 border-b border-zinc-100 dark:border-white/5 bg-white dark:bg-zinc-950 z-40">
        
        <!-- Logo -->
        <div class="flex items-center gap-2">
            <h1 class="font-bold text-xl tracking-tight flex items-center gap-1">
                Studio<span class="font-normal text-zinc-400">Pro</span>
            </h1>
        </div>

        <!-- Desktop Search & Nav (Centered) -->
        <div class="hidden md:flex items-center justify-center flex-1 px-8">
            <div class="relative w-full max-w-[400px] group">
                <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400 group-focus-within:text-zinc-600 dark:group-focus-within:text-zinc-300 transition-colors"></i>
                <input type="text" id="search-input" placeholder="Search tools..." class="w-full bg-zinc-100 dark:bg-white/5 border-none focus:ring-2 focus:ring-brand-500/50 rounded-full py-2 pl-10 pr-4 text-[14px] text-zinc-800 dark:text-zinc-200 outline-none transition-all placeholder-zinc-400 dark:placeholder-zinc-500" oninput="handleSearch()">
            </div>
        </div>

        <!-- Right Actions -->
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-colors">
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block" id="icon-light"></i>
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden" id="icon-dark"></i>
            </button>
            <a href="#" class="hidden sm:flex items-center justify-center px-5 py-2 rounded-full bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 font-semibold text-[14px] hover:opacity-90 transition-opacity">
                Start creating
            </a>
        </div>
    </header>

    <!-- Main Layout Area -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Left Sidebar (Desktop Only) -->
        <aside class="hidden md:flex w-[240px] flex-col border-r border-zinc-100 dark:border-white/5 bg-white dark:bg-zinc-950 shrink-0">
            <nav class="flex-1 px-4 py-8 space-y-1.5" id="desktop-nav">
                <button class="nav-item active w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[14px] text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-white/5 transition-colors" data-category="All" onclick="setCategory('All')">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i> All Studios
                </button>
                <div class="h-4"></div> <!-- Spacer -->
                
                <h4 class="px-3 text-[11px] font-semibold text-zinc-400 uppercase tracking-wider mb-2">Categories</h4>
                
                <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[14px] text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-white/5 transition-colors" data-category="Animation" onclick="setCategory('Animation')">
                    <i data-lucide="film" class="w-4 h-4"></i> Animation
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[14px] text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-white/5 transition-colors" data-category="Drawing" onclick="setCategory('Drawing')">
                    <i data-lucide="pen-tool" class="w-4 h-4"></i> Drawing & Art
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[14px] text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-white/5 transition-colors" data-category="Utility" onclick="setCategory('Utility')">
                    <i data-lucide="wrench" class="w-4 h-4"></i> Utility
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[14px] text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-white/5 transition-colors" data-category="3D" onclick="setCategory('3D')">
                    <i data-lucide="box" class="w-4 h-4"></i> 3D & WebGL
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col overflow-hidden bg-white dark:bg-zinc-950">
            
            <!-- Mobile Search & Horizontal Nav (Hidden on Desktop) -->
            <div class="md:hidden flex flex-col shrink-0 border-b border-zinc-100 dark:border-white/5 pt-4">
                <div class="px-4 mb-4 relative">
                    <i data-lucide="search" class="absolute left-7 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400"></i>
                    <input type="text" id="mobile-search-input" placeholder="Search tools..." class="w-full bg-zinc-100 dark:bg-white/5 border-none rounded-full py-2.5 pl-10 pr-4 text-[14px] text-zinc-800 dark:text-zinc-200 outline-none" oninput="document.getElementById('search-input').value = this.value; handleSearch();">
                </div>
                <div class="flex overflow-x-auto hide-scrollbar px-4 pb-4 gap-2" id="mobile-nav">
                    <button class="nav-item active shrink-0 px-4 py-1.5 rounded-full text-[13px] border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400" data-category="All" onclick="setCategory('All')">All</button>
                    <button class="nav-item shrink-0 px-4 py-1.5 rounded-full text-[13px] border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400" data-category="Animation" onclick="setCategory('Animation')">Animation</button>
                    <button class="nav-item shrink-0 px-4 py-1.5 rounded-full text-[13px] border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400" data-category="Drawing" onclick="setCategory('Drawing')">Drawing</button>
                    <button class="nav-item shrink-0 px-4 py-1.5 rounded-full text-[13px] border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400" data-category="Utility" onclick="setCategory('Utility')">Utility</button>
                    <button class="nav-item shrink-0 px-4 py-1.5 rounded-full text-[13px] border border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-400" data-category="3D" onclick="setCategory('3D')">3D</button>
                </div>
            </div>

            <!-- Scrollable Gallery -->
            <div class="flex-1 overflow-y-auto p-6 md:p-12 lg:px-20">
                
                <div class="max-w-6xl mx-auto">
                    <!-- Hero -->
                    <div class="mb-10 sm:mb-16">
                        <h2 class="text-4xl sm:text-5xl font-bold tracking-tight mb-4 text-zinc-900 dark:text-white">Creative browser engines</h2>
                        <p class="text-[16px] text-zinc-600 dark:text-zinc-400 max-w-2xl leading-relaxed">
                            Create professional animations, drawings, and 3D renders in no time with our collection of natively built web engines.
                        </p>
                    </div>

                    <!-- Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12" id="studio-grid">
                        <!-- Cards injected via JS -->
                    </div>

                    <!-- Empty State -->
                    <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-zinc-400 dark:text-zinc-500">
                        <i data-lucide="search-x" class="w-12 h-12 mb-4 opacity-40"></i>
                        <h3 class="text-[16px] font-medium text-zinc-900 dark:text-white">No results found</h3>
                        <p class="text-[14px] mt-1">We couldn't find any engines matching your search.</p>
                    </div>
                </div>

                <footer class="mt-24 pb-8 text-[13px] text-zinc-400 dark:text-zinc-600">
                    <p>Designed for native performance on the web.</p>
                </footer>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // --- Theme Logic ---
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // --- Studio Data ---
        const studios = [
            { id: 1, title: "Macify Web Studio", category: "Utility", icon: "monitor", gradient: "from-sky-400 to-blue-600" },
            { id: 2, title: "Sumi-e Studio Pro", category: "Drawing", icon: "feather", gradient: "from-rose-500 to-red-700" },
            { id: 3, title: "Title Animator Pro", category: "Animation", icon: "type", gradient: "from-fuchsia-500 to-purple-600" },
            { id: 4, title: "Waveform Studio", category: "Utility", icon: "audio-lines", gradient: "from-orange-500 to-rose-600" },
            { id: 5, title: "Emoji Motion", category: "Animation", icon: "smile", gradient: "from-yellow-400 to-amber-600" },
            { id: 6, title: "Mixamo 3D Studio", category: "3D", icon: "box", gradient: "from-blue-500 to-indigo-700" },
            { id: 7, title: "Rough Animator", category: "Drawing", icon: "pen-tool", gradient: "from-indigo-500 to-purple-600" },
            { id: 8, title: "Social Animator", category: "Utility", icon: "share-2", gradient: "from-cyan-400 to-blue-500" },
            { id: 9, title: "Motion Math", category: "Animation", icon: "sigma", gradient: "from-emerald-400 to-teal-600" }
        ];

        let currentCategory = 'All';
        let currentSearch = '';

        function setCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) {
                    btn.classList.add('active');
                }
            });
            renderGrid();
        }

        function handleSearch() {
            currentSearch = document.getElementById('search-input').value.toLowerCase();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('studio-grid');
            const emptyState = document.getElementById('empty-state');
            
            const filtered = studios.filter(studio => {
                const matchesCategory = currentCategory === 'All' || studio.category === currentCategory;
                const matchesSearch = studio.title.toLowerCase().includes(currentSearch);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');

            let html = '';
            filtered.forEach(studio => {
                html += `
                    <div class="group cursor-pointer flex flex-col gap-4">
                        
                        <!-- Thumbnail Image Area (Jitter Style) -->
                        <div class="aspect-[4/3] rounded-2xl bg-zinc-100 dark:bg-zinc-900/50 flex items-center justify-center overflow-hidden relative border border-zinc-200/50 dark:border-white/5 transition-shadow duration-300 group-hover:shadow-lg dark:group-hover:shadow-white/5">
                            
                            <!-- Soft Gradient Glow -->
                            <div class="absolute inset-0 opacity-[0.15] dark:opacity-20 bg-gradient-to-br ${studio.gradient}"></div>
                            
                            <!-- Centered Icon App Block -->
                            <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-[18px] bg-white dark:bg-zinc-800 shadow-sm flex items-center justify-center relative z-10 transform group-hover:scale-110 transition-transform duration-500 cubic-bezier(0.16, 1, 0.3, 1)">
                                <i data-lucide="${studio.icon}" class="w-7 h-7 sm:w-8 sm:h-8 text-zinc-700 dark:text-zinc-200"></i>
                            </div>
                        </div>

                        <!-- Minimal Content -->
                        <div class="flex items-start justify-between px-1">
                            <div>
                                <h3 class="font-semibold text-[16px] text-zinc-900 dark:text-zinc-100 tracking-tight">${studio.title}</h3>
                                <p class="text-[14px] text-zinc-500 dark:text-zinc-400 mt-0.5">${studio.category}</p>
                            </div>
                            <!-- Appears on hover -->
                            <div class="w-8 h-8 rounded-full bg-zinc-100 dark:bg-white/10 flex items-center justify-center text-zinc-400 dark:text-zinc-300 opacity-0 -translate-x-2 group-hover:translate-x-0 group-hover:opacity-100 transition-all duration-300">
                                <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
            lucide.createIcons();
        }

        // Initialize
        renderGrid();

    </script>
</body>
</html>
