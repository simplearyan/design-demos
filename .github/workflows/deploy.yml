name: Build & Deploy Design Demos to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages-deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate Index (Fast — no browser needed)
        run: node generate-index.js

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Generate Preview Screenshots
        run: node generate-preview.js
        # Don't fail the whole deploy if Puppeteer has issues
        continue-on-error: true

      # --- Build the clean gh-pages output directory ---
      - name: Assemble clean deploy output
        run: |
          mkdir -p _site

          # Copy the portal index files
          cp index.html _site/index.html
          cp index-preview.html _site/index-preview.html

          # Copy each project directory (HTML + assets only, no node scripts)
          for dir in brutalism capcut-clone-deisng flourish-design gemini-lms kenichi-animation-studio landing-pages personal-notes-site pol-math zero-gravity zero-gravity-v2; do
            if [ -d "$dir" ]; then
              cp -r "$dir" "_site/$dir"
            fi
          done

          # Copy screenshots (generated by Puppeteer above)
          if [ -d "screenshots" ]; then
            cp -r screenshots _site/screenshots
          fi

          # Copy palette documentation
          cp *.md _site/ 2>/dev/null || true

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
