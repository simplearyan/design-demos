name: Generate Design Previews (Manual)

# This workflow is kept as a MANUAL trigger only.
# Automatic preview generation is now handled inside deploy.yml.
# Use this if you want to regenerate screenshots WITHOUT triggering a full deploy.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer browsers
        run: npx puppeteer browsers install chrome

      - name: Generate previews
        run: node generate-preview.js

      - name: Commit screenshots back to main (for local reference)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f screenshots/ index-preview.html
          git diff --staged --quiet || git commit -m "chore: regenerate design previews [skip ci]"
          git push
